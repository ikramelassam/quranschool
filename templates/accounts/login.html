{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة زدني علماً</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        body {
            background-color: #f0ebe3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .logo-container { text-align: center; margin-bottom: 24px; }
        .logo-container img { width: 120px; border-radius: 12px; }
        .site-title {
            color: #2d5a1b;
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 4px;
        }
        .site-subtitle {
            color: #888;
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 32px;
        }
        .form-label { color: #333; font-weight: 500; }
        .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 10px 14px;
            font-family: 'Tajawal', sans-serif;
            text-align: right;
        }
        .form-control:focus {
            border-color: #2d5a1b;
            box-shadow: 0 0 0 3px rgba(45,90,27,0.1);
        }
        .btn-login {
            background-color: #2d5a1b;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            margin-top: 8px;
            transition: all 0.2s;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
        }
        .btn-login:hover { background-color: #1e3d12; transform: translateY(-1px); }
        .divider {
            text-align: center;
            color: #aaa;
            margin: 20px 0;
            font-size: 0.9rem;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: #e0e0e0;
        }
        .divider::before { right: 0; }
        .divider::after { left: 0; }
        .btn-student {
            display: block;
            border: 2px solid #2d5a1b;
            color: #2d5a1b;
            background: white;
            border-radius: 8px;
            padding: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            width: 100%;
            margin-bottom: 10px;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
            font-family: 'Tajawal', sans-serif;
        }
        .btn-student:hover { background: #f0f7ed; transform: translateY(-1px); color: #2d5a1b; }
        .btn-teacher {
            display: block;
            border: 2px solid #C9A84C;
            color: #C9A84C;
            background: white;
            border-radius: 8px;
            padding: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            width: 100%;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
            font-family: 'Tajawal', sans-serif;
        }
        .btn-teacher:hover { background: #fdf8ec; transform: translateY(-1px); color: #C9A84C; }
    </style>
</head>
<body>
    <div class="login-card">

        <!-- Logo -->
        <div class="logo-container">
            <img src="{% static 'images/logo.png' %}" alt="Logo زدني علماً">
        </div>

        <!-- Titre -->
        <div class="site-title">منصة زدني علماً</div>
        <div class="site-subtitle">لتحفيظ القرآن الكريم عن بعد</div>

        <!-- Erreur -->
        {% if error %}
        <div class="alert alert-danger text-center">{{ error }}</div>
        {% endif %}

        <!-- Formulaire -->
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">البريد الإلكتروني</label>
                <input type="email" name="email" class="form-control"
                       placeholder="أدخل بريدك الإلكتروني" required>
            </div>

            <div class="mb-3">
                <label class="form-label">كلمة المرور</label>
                <input type="password" name="password" class="form-control"
                       placeholder="أدخل كلمة المرور" required>
            </div>

            <button type="submit" class="btn-login">تسجيل الدخول</button>
        </form>

        <!-- Divider -->
        <div class="divider">جديد ؟</div>

        <!-- Boutons inscription -->
        <a href="{% url 'inscription_eleve_choix' %}" class="btn-student">التسجيل كطالب</a>
        <a href="{% url 'inscription_prof' %}"" class="btn-teacher">التسجيل كمعلم</a>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
