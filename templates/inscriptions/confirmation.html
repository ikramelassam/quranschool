{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        body { background-color: #f0ebe3; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { border-radius: 16px; padding: 40px; text-align: center; max-width: 500px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        h2 { color: #2d5a1b; font-weight: 700; }
    </style>
</head>
<body>
<div class="card bg-white">
    <div style="font-size:4rem">✅</div>
    <h2>تم إرسال طلبك بنجاح!</h2>
    <p class="text-muted mt-3">سيتم التواصل معك قريباً بعد مراجعة طلبك من قِبَل الإدارة.</p>
    <a href="{% url 'login' %}" class="btn mt-4" style="background:#2d5a1b; color:white; border-radius:8px; padding:10px 30px;">
        العودة للرئيسية
    </a>
</div>
</body>
</html>
