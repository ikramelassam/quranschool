{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التسجيل كطالب</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        body {
            background-color: #f0ebe3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { width: 100px; border-radius: 12px; }
        .page-title {
            color: #2d5a1b;
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 4px;
        }
        .page-subtitle {
            color: #888;
            text-align: center;
            margin-bottom: 30px;
        }
        .choice-card {
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .choice-card:hover {
            border-color: #2d5a1b;
            background: #f0f7ed;
        }
        .choice-card.selected {
            border-color: #2d5a1b;
            background: #f0f7ed;
        }
        .choice-card .emoji { font-size: 2.5rem; margin-bottom: 10px; }
        .choice-card .choice-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #333;
        }
        .choice-card .choice-desc {
            font-size: 0.85rem;
            color: #888;
            margin-top: 4px;
        }
        .btn-continue {
            background-color: #2d5a1b;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
        }
        .btn-continue:hover { background-color: #1e3d12; }
        .btn-back {
            border: 2px solid #ddd;
            color: #888;
            background: white;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            text-decoration: none;
            display: block;
            text-align: center;
        }
        .btn-back:hover { border-color: #aaa; color: #555; }
    </style>
</head>
<body>
    <div class="card-container">

        <!-- Logo -->
        <div class="logo-container">
            <img src="{% static 'images/logo.jpeg' %}" alt="Logo">
        </div>

        <!-- Titre -->
        <div class="page-title">التسجيل كطالب</div>
        <div class="page-subtitle">اختر الفئة العمرية</div>

        <!-- Choix -->
        <div class="row g-3 mb-4">
            <div class="col-6">
                <div class="choice-card selected" id="card-enfant" onclick="selectAge('enfant')">
                    <div class="emoji">👶</div>
                    <div class="choice-title">طفل (4-15 سنة)</div>
                    <div class="choice-desc">برنامج خاص للأطفال</div>
                </div>
            </div>
            <div class="col-6">
                <div class="choice-card" id="card-adulte" onclick="selectAge('adulte')">
                    <div class="emoji">🎓</div>
                    <div class="choice-title">بالغ (+16 سنة)</div>
                    <div class="choice-desc">برنامج للبالغين</div>
                </div>
            </div>
        </div>

        <!-- Boutons -->
        <div class="row g-3">
            <div class="col-6">
                <button class="btn-continue" onclick="continuer()">متابعة</button>
            </div>
            <div class="col-6">
                <a href="{% url 'login' %}" class="btn-back">رجوع ←</a>
            </div>
        </div>

    </div>

    <script>
        let selectedAge = 'enfant';

        function selectAge(age) {
            selectedAge = age;
            document.getElementById('card-enfant').classList.remove('selected');
            document.getElementById('card-adulte').classList.remove('selected');
            document.getElementById('card-' + age).classList.add('selected');
        }

        function continuer() {
            window.location.href = "{% url 'inscription_eleve_formulaire' 'TYPE_AGE' %}".replace('TYPE_AGE', selectedAge);
        }
    </script>
</body>
</html>
