{% extends 'dashboard/base_admin.html' %}
{% block title %}تعديل نوع الاشتراك{% endblock %}
{% block content %}
<div class="page-title">تعديل: {{ type_abonnement.label }}</div>

<div style="background:white; border-radius:16px; padding:32px; max-width:500px; box-shadow:0 2px 12px rgba(0,0,0,0.06);">
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label style="font-weight:600; color:#333;">الرمز</label>
            <input type="text" class="form-control mt-1" value="{{ type_abonnement.code }}" disabled>
            <div style="color:#888; font-size:0.8rem; margin-top:4px;">الرمز غير قابل للتعديل (مستخدم في طلبات تسجيل سابقة).</div>
        </div>
        <div class="mb-3">
            <label style="font-weight:600; color:#333;">الاسم المعروض *</label>
            <input type="text" name="label" class="form-control mt-1" value="{{ type_abonnement.label }}" required>
        </div>
        <div class="mb-3">
            <label style="font-weight:600; color:#333;">السعر (درهم) *</label>
            <input type="number" step="0.01" name="prix" class="form-control mt-1" value="{{ type_abonnement.prix }}" required>
        </div>
        <div class="mb-3">
            <label style="font-weight:600; color:#333;">ترتيب الظهور</label>
            <input type="number" name="ordre" class="form-control mt-1" value="{{ type_abonnement.ordre }}">
        </div>
        <div class="d-flex gap-3 mt-4">
            <button type="submit"
                style="background:#2d5a1b; color:white; border:none; border-radius:8px; padding:10px 24px; font-family:'Tajawal',sans-serif; font-size:1rem; cursor:pointer;">
                حفظ التعديلات ✅
            </button>
            <a href="{% url 'admin_parametres_abonnements' %}" style="color:#888; text-decoration:none; padding:10px;">← رجوع</a>
        </div>
    </form>
</div>
{% endblock %}
