{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}لوحة الطالب{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Tajawal', sans-serif; }
        body { background-color: #f0ebe3; margin: 0; }
        .sidebar {
            position: fixed; right: 0; top: 0;
            height: 100vh; width: 240px;
            background: #2d5a1b;
            display: flex; flex-direction: column;
            z-index: 100; overflow-y: auto;
        }
        .sidebar-logo { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-logo img { width: 60px; border-radius: 10px; }
        .sidebar-logo .title { color: white; font-weight: 700; font-size: 1rem; margin-top: 8px; }
        .sidebar-logo .subtitle { color: rgba(255,255,255,0.6); font-size: 0.75rem; }
        .sidebar-menu { padding: 16px 0; flex: 1; }
        .menu-item {
            display: flex; align-items: center;
            padding: 12px 20px; color: rgba(255,255,255,0.8);
            text-decoration: none; transition: all 0.2s; font-size: 0.95rem;
        }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .menu-item.active { background: rgba(255,255,255,0.15); color: white; font-weight: 600; }
        .menu-item .icon { margin-left: 10px; font-size: 1.1rem; }
        .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn-logout {
            display: block; color: rgba(255,255,255,0.7); text-decoration: none;
            font-size: 0.9rem; text-align: center; padding: 8px;
            border-radius: 8px; transition: all 0.2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.1); color: white; }
        .main-content { margin-right: 240px; min-height: 100vh; padding: 32px; }
        .page-title { color: #2d5a1b; font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
        .page-subtitle { color: #888; margin-bottom: 30px; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo">
        <img src="{% static 'images/logo.png' %}" alt="Logo">
        <div class="title">منصة زدني علماً</div>
        <div class="subtitle">لوحة الطالب</div>
    </div>
    <div class="sidebar-menu">
        <a href="{% url 'dashboard_eleve' %}"
           class="menu-item {% if request.resolver_match.url_name == 'dashboard_eleve' %}active{% endif %}">
            <span class="icon">📊</span> لوحة التحكم
        </a>
        <a href="{% url 'eleve_seances' %}"
           class="menu-item {% if request.resolver_match.url_name == 'eleve_seances' %}active{% endif %}">
            <span class="icon">📋</span> حصصي وتقييماتي
        </a>
        <a href="{% url 'eleve_profil' %}"
           class="menu-item {% if request.resolver_match.url_name == 'eleve_profil' %}active{% endif %}">
            <span class="icon">👤</span> ملفي الشخصي
        </a>
        <a href="{% url 'eleve_paiements' %}"
           class="menu-item {% if request.resolver_match.url_name == 'eleve_paiements' %}active{% endif %}">
            <span class="icon">💰</span> مدفوعاتي
        </a>
        <a href="#" class="menu-item">
            <span class="icon">⚙️</span> الإعدادات
        </a>
    </div>
    <div class="sidebar-footer">
        <a href="{% url 'logout' %}" class="btn-logout">🚪 تسجيل الخروج</a>
    </div>
</div>
<div class="main-content">
    {% include 'dashboard/_messages.html' %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
