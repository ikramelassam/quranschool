{% extends 'dashboard/base_admin.html' %}
{% block title %}تعديل معيار{% endblock %}
{% block content %}
<div class="page-title">تعديل معيار تقييم</div>

<div style="background:white; border-radius:16px; padding:32px; max-width:500px; box-shadow:0 2px 12px rgba(0,0,0,0.06);">
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label style="font-weight:600; color:#333;">نص المعيار *</label>
            <textarea name="nom_ar" class="form-control mt-1" rows="2" required>{{ critere.nom_ar }}</textarea>
        </div>
        <div class="mb-3">
            <label style="font-weight:600; color:#333;">ترتيب الظهور</label>
            <input type="number" name="ordre" class="form-control mt-1" value="{{ critere.ordre }}">
        </div>
        <div class="d-flex gap-3 mt-4">
            <button type="submit"
                style="background:#2d5a1b; color:white; border:none; border-radius:8px; padding:10px 24px; font-family:'Tajawal',sans-serif; font-size:1rem; cursor:pointer;">
                حفظ التعديلات ✅
            </button>
            <a href="{% url 'admin_criteres' %}" style="color:#888; text-decoration:none; padding:10px;">← رجوع</a>
        </div>
    </form>
</div>
{% endblock %}
