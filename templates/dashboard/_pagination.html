{% if page_obj.has_other_pages %}
<div class="d-flex justify-content-center align-items-center gap-3 mt-4" style="font-size:0.9rem;">
    {% if page_obj.has_previous %}
        <a href="{% querystring page=page_obj.previous_page_number %}" style="color:#555; text-decoration:none;">→ السابق</a>
    {% else %}
        <span style="color:#ccc;">→ السابق</span>
    {% endif %}

    <span style="color:#888;">صفحة {{ page_obj.number }} من {{ page_obj.paginator.num_pages }}</span>

    {% if page_obj.has_next %}
        <a href="{% querystring page=page_obj.next_page_number %}" style="color:#555; text-decoration:none;">التالي ←</a>
    {% else %}
        <span style="color:#ccc;">التالي ←</span>
    {% endif %}
</div>
{% endif %}
